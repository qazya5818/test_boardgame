  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1020px;
      overflow: hidden;
      transform-origin: top left;
      background-image: url('images/bg.png');
      background-size: 1920px 1020px;
      background-position: top left;
      background-repeat: no-repeat;
    }

    /* ───────────────────────────────
       캐릭터 그룹
    ─────────────────────────────── */
    #char-group,
    #char-group2 {
      position: absolute;
    }

    #char-group  { left: 130px; top: 141px; transition: left 0.66s ease, top 0.66s ease; z-index: 2; }
    #char-group2 { left:   7px; top: 141px; transition: left 0.66s ease, top 0.66s ease; z-index: 1; }

    #char-group img,
    #char-group2 img {
      position: absolute;
      top: 0;
      left: 0;
    }

    #char-blur,
    #char-blur2 {
      visibility: hidden; /* 이벤트 전까지 비표시 */
      animation: none;
    }

    #char-blur.active,
    #char-blur2.active {
      visibility: visible;
      animation: blurPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes blurPulse {
      from { opacity: 0.5; }
      to   { opacity: 1.0; }
    }

    /* ───────────────────────────────
       버튼
    ─────────────────────────────── */
    .btn {
      position: absolute;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      user-select: none;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    #btn-how   { left: 1735px; top:  120px; }
    #pop-1-wrapper {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20002;
      display: none;
    }
    #pop-1 {
      display: block;
    }
    #pop-1-close {
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      cursor: pointer;
    }
    #btn-start { left:  758px; top:  374px; z-index: 9999; }
    #btn-dice  { left: 1638px; top:  770px; }
    @keyframes dice-blink {
      0%, 100% { outline: 6px solid transparent; outline-offset: 2px; border-radius: 30px; }
      50%       { outline: 6px solid red;         outline-offset: 2px; border-radius: 30px; }
    }
    #btn-dice.pulse { animation: dice-blink 0.8s ease-in-out infinite; }

    #btn-restart {
      position: absolute;
      left: 1461px;
      top: 920px;
      display: none;
      cursor: pointer;
      background: #e05c2a;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      padding: 16px 28px;
      z-index: 9999;
      transition: transform 0.15s ease;
      user-select: none;
    }

    #btn-restart:hover  { transform: scale(1.05); }
    #btn-restart:active { transform: scale(0.95); }

       박스 버튼 그룹

       주사위 스프라이트 애니메이션
    ─────────────────────────────── */
    .dice-sprite {
      position: absolute;
      left: 50%;
      top: calc(50% - 90px);
      transform: translate(-50%, -50%);
      width: 323px;
      height: 670px;
      background-repeat: no-repeat;
      background-position: 0 0;
      background-size: 7106px 670px; /* 323*22=7106 */
      display: none;
      cursor: pointer;
      z-index: 20001;

    @keyframes diceRoll {
      from { background-position: 0 0; }
      to   { background-position: -7106px 0; }
    }

    .dice-sprite.playing {
      animation: diceRoll 2s steps(22, end);

    ═══════════════════════════════ -->

    function scaleApp() {
      const app = document.getElementById('app');
      const scaleX = window.innerWidth / 1920;
      const scaleY = window.innerHeight / 1020;
      const scale = Math.min(scaleX, scaleY);
      app.style.transform = `scale(${scale})`;
    }

    scaleApp();
    window.addEventListener('resize', scaleApp);

    let diceTimer = null;
    let spriteTimer1 = null;
    let spriteTimer2 = null;
    let spriteTimer3 = null;

    var bgm = new Audio('mp3/game_tp6_bgm.mp3');
    bgm.loop = true;
    bgm.volume = 0.2;
    bgm.playbackRate = 0.85;

    document.addEventListener('click', function startBgm() {
      bgm.play();
      document.removeEventListener('click', startBgm);
    });

    var diceSound = new Audio('mp3/dice.mp3');
    var finishSound = new Audio('mp3/finish.mp3');
    var clickSound = new Audio('mp3/click.mp3');
    var wrongSound = new Audio('mp3/wrong_b.mp3');
    wrongSound.volume = 0.5;

    document.addEventListener('mouseup', function (e) {
      var target = e.target;
      if (
        target.tagName === 'BUTTON' ||
        target.classList.contains('btn') ||
        target.classList.contains('btn-box-toggle') ||
        target.closest('.btn-box-toggle')
      ) {
        setTimeout(function () { clickSound.cloneNode().play(); }, 100);
      }
    });

    function playDice(spriteId) {
      setTimeout(function () {
        diceSound.currentTime = 0;
        diceSound.play();
      }, 1000);
      const sprite = document.getElementById(spriteId);
      const popup2 = document.getElementById('popup-2');

      // 기존 타이머 초기화 및 모든 스프라이트 숨김
      clearTimeout(spriteTimer1);
      clearTimeout(spriteTimer2);
      clearTimeout(spriteTimer3);
      document.querySelectorAll('.dice-sprite').forEach(function (el) {
        el.classList.remove('playing');
        el.style.backgroundPosition = '0 0';
        el.style.display = 'none';
      });

      sprite.style.display = 'block';

      // [0s] 첫 프레임 표시 → [0.5s] 애니메이션 시작
      spriteTimer1 = setTimeout(function () {
        void sprite.offsetWidth;
        sprite.classList.add('playing');
      }, 500);

      // [0.5s + 2s = 2.5s] 애니메이션 종료 → 마지막 프레임 고정
      spriteTimer2 = setTimeout(function () {
        sprite.classList.remove('playing');
        sprite.style.backgroundPosition = '-6783px 0'; /* 323 * 21 = 마지막 프레임 */
      }, 2500);

      // [2.5s + 1.5s = 4s] 마지막 프레임 유지 후 숨김
      spriteTimer3 = setTimeout(function () {
        sprite.style.display = 'none';
        sprite.style.backgroundPosition = '0 0';
      }, 4000);

      // 팝업 4초 노출
      popup2.style.display = 'block';
      clearTimeout(diceTimer);
      diceTimer = setTimeout(function () {
        popup2.style.display = 'none';
      }, 4000);
    }

    document.getElementById('btn-start').addEventListener('click', function () {
      this.style.display = 'none';
      document.getElementById('popup-7').style.display = 'block';
    });

    var orderSelected = false;
    var selectedCharGroup = null;  // 최초 선택 캐릭터
    var currentTurn = null;        // 현재 차례 캐릭터
    var isTurnBusy = false;        // 이동 중 중복 방지

    // 캐릭터별 현재 방 위치 (0 = 시작)
    var charCurrentRoom = { 'char-group': 0, 'char-group2': 0 };

    function getOtherChar(charGroup) {
      return charGroup === 'char-group' ? 'char-group2' : 'char-group';
    }

    // 같은 방 공유 시 좌우 배치, 아니면 중앙 복귀
    function adjustSameRoom() {
      var r1 = charCurrentRoom['char-group'];
      var r2 = charCurrentRoom['char-group2'];
      var el1 = document.getElementById('char-group');
      var el2 = document.getElementById('char-group2');

      if (r1 > 0 && r1 === r2) {
        // 같은 방 - char-2 왼쪽, char-1 오른쪽, -100px 간격(겹침)
        var room = document.getElementById('room-' + r1);
        el2.style.left = room.offsetLeft + 'px';        /* 왼쪽 */
        el1.style.left = (room.offsetLeft + 60) + 'px'; /* 60px 겹침 */
      } else {
        // 각자 방 - 중앙 복귀
        if (r1 > 0) {
          var room1 = document.getElementById('room-' + r1);
          el1.style.left = room1.offsetLeft + 'px';
        }
        if (r2 > 0) {
          var room2 = document.getElementById('room-' + r2);
          el2.style.left = room2.offsetLeft + 'px';
        }
      }
    }

    function endGame() {
      document.getElementById('btn-restart').style.display = 'block';

    function resetGame() {
      // 타이머 전체 초기화
      clearTimeout(diceTimer);
      clearTimeout(spriteTimer1);
      clearTimeout(spriteTimer2);
      clearTimeout(spriteTimer3);

      // 상태 초기화

      selectedCharGroup = null;
      currentTurn       = null;
      isTurnBusy        = false;
      charCurrentRoom   = { 'char-group': 0, 'char-group2': 0 };

      // 캐릭터 transition 끄고 즉시 원위치
      var cg1 = document.getElementById('char-group');
      var cg2 = document.getElementById('char-group2');
      cg1.style.transition = 'none';
      cg2.style.transition = 'none';
      cg1.style.left = '130px'; cg1.style.top = '141px';
      cg2.style.left = '7px';   cg2.style.top = '141px';
      // transition 복구 (다음 프레임)
      requestAnimationFrame(function () {
        cg1.style.transition = '';
        cg2.style.transition = '';
      });

      // blur 초기화
      document.getElementById('char-blur').classList.remove('active');
      document.getElementById('char-blur2').classList.remove('active');

      // UI 초기화
      document.getElementById('btn-start').style.display   = 'block';
      document.getElementById('btn-restart').style.display = 'none';
      document.getElementById('popup-7').style.display     = 'none';
      document.getElementById('popup-2').style.display     = 'none';
      document.getElementById('slide-container').style.display = 'none';

      // 주사위 스프라이트 초기화
      document.querySelectorAll('.dice-sprite').forEach(function (el) {
        el.classList.remove('playing');
        el.style.backgroundPosition = '0 0';
        el.style.display = 'none';
      });
    }

    // 박스 버튼 토글

    var boxGroupSlides    = [1,3,5,7,8,11,12,13,15,17,19,20,22,23];

    var roomToSlide = {};

    function showSlide(roomNum) {
      var slideNum = roomToSlide[roomNum] !== undefined ? roomToSlide[roomNum] : roomNum;
      var src = 'images/slide-' + slideNum + '.png';
      var container = document.getElementById('slide-container');
      var img = document.getElementById('slide-img');
      img.src = src;
      container.style.display = 'block';

      // btn-box-group 노출 여부
      var boxGroup = document.getElementById('btn-box-group');
      boxGroup.style.display = boxGroupSlides.indexOf(roomNum) !== -1 ? 'flex' : 'none';

      // box-g가 있는 슬라이드는 box-g 사라질 때까지 비활성화
      var boxGSlides = [1, 3, 5, 7, 8, 11, 12, 13, 15, 17, 19, 20, 22, 23];
      if (boxGSlides.indexOf(roomNum) !== -1) {
        boxGroup.classList.add('box-disabled');
      } else {
        boxGroup.classList.remove('box-disabled');
      }

      // btn-box2-group 노출 여부
      var box2Group = document.getElementById('btn-box2-group');
      box2Group.style.display = box2GroupSlides.indexOf(roomNum) !== -1 ? 'flex' : 'none';

      // slide-11 전용 요소 노출 여부
      var slide11Content = document.getElementById('slide-11-content');
      if (roomNum === 11) {
        slide11Content.style.display = 'block';
        document.getElementById('box-g-11').style.opacity = '1';
      } else {
        slide11Content.style.display = 'none';
      }

      // slide-3 전용 요소 노출 여부

      if (roomNum === 3) {
        slide3Content.style.display = 'block';
        document.getElementById('box-g-3').style.opacity = '1';
        document.getElementById('btn-question').style.display = 'block';
      } else {
        slide3Content.style.display = 'none';
        document.getElementById('btn-question').style.display = 'none';
      }

      // slide-1 전용 요소 노출 여부
      var slide1Content = document.getElementById('slide-1-content');
      if (roomNum === 1) {
        slide1Content.style.display = 'block';
        document.getElementById('box-g').style.opacity = '1';
      } else {
        slide1Content.style.display = 'none';
      }

      // slide-5 전용 요소 노출 여부

    function forceMoveCharacter(charId, steps) {
      var current = charCurrentRoom[charId];
      var target  = current + steps;
      if (target > 25) target = 25;

      var charEl = document.getElementById(charId);
      var step   = current;

      function moveStep() {
        step++;
        var room = document.getElementById('room-' + step);
        if (!room) return;
        charEl.style.left = room.offsetLeft + 'px';
        charEl.style.top  = room.offsetTop  + 'px';
        if (step < target) {
          setTimeout(moveStep, 714);
        } else {
          charCurrentRoom[charId] = target;
          adjustSameRoom();
          if (target >= 25) {
            finishSound.play();
            var blurId = (charId === 'char-group') ? 'char-blur' : 'char-blur2';
            setTimeout(function () {
              document.getElementById(blurId).classList.add('active');
            }, 500);
            setTimeout(function () { endGame(); }, 1000);
          } else {
            setTimeout(function () { showSlide(target); }, 1000);
          }
        }
      }
      moveStep();
    }

    function moveCharacter(result) {
      if (!currentTurn) return;

      var moving = currentTurn;
      var current = charCurrentRoom[moving];
      var target = current + result;
      if (target > 25) target = 25;

      var charEl = document.getElementById(moving);
      var step = current;

      function moveStep() {
        step++;
        var room = document.getElementById('room-' + step);
        if (!room) return;

        charEl.style.left = room.offsetLeft + 'px';
        charEl.style.top  = room.offsetTop  + 'px';

        if (step < target) {
          setTimeout(moveStep, 714);
        } else {
          // 최종 도착
          charCurrentRoom[moving] = target;

          // 같은 방 위치 조정
          adjustSameRoom();

          if (target >= 25) {
            // 게임 종료 - 0.5초 후 도착 캐릭터 토글(blurPulse)
            isTurnBusy = false;
            finishSound.play();
            var blurId = (moving === 'char-group') ? 'char-blur' : 'char-blur2';
            setTimeout(function () {
              document.getElementById(blurId).classList.add('active');
            }, 500);
            setTimeout(function () { endGame(); }, 1000);
          } else {
            // 차례 전환
            currentTurn = getOtherChar(moving);
            isTurnBusy = false;
            // 1초 후 슬라이드 노출
            setTimeout(function () { showSlide(target); }, 1000);
          }
        }
      }

      moveStep();
    }
